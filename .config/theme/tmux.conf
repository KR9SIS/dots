# Kanagawa theme for tmux
set -g status-style "bg=default,fg=#dcd7ba"
set -g status-left "#[fg=#1f1f28,bg=#7e9cd8,bold] #S #[bg=default] "
set -g status-right "#[fg=#7e9cd8]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#[fg=#727169]#h "
set -g window-status-format "#[fg=#727169] #I:#W "
set -g window-status-current-format "#[fg=#7e9cd8,bold] #I:#W "
set -g pane-border-style "fg=#727169"
set -g pane-active-border-style "fg=#7e9cd8"
set -g message-style "bg=default,fg=#7e9cd8"
set -g message-command-style "bg=default,fg=#7e9cd8"
set -g mode-style "bg=#7e9cd8,fg=#1f1f28"
setw -g clock-mode-colour "#7e9cd8"
